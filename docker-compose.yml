services:
  # 1. The FastAPI Application (The Agentic Brain)
  app:
    build: .
    container_name: cato_app
    ports:
      - "8000:8000"
    env_file:
      - .env # Load environment variables (like REDIS_URL)
    volumes:
      - .:/app # Allows live code editing during development
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy # Wait for Redis to be ready
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis Stack Server (The Memory & RAG Engine)
  redis:
    image: redis/redis-stack-server:latest
    container_name: cato_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data # Persists vectors even if container stops
    healthcheck: # Ensures Redis is actually responding
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # RedisInsight
  redis-insight:
    image: redis/redisinsight:latest
    container_name: cato_viz
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  redis_data: